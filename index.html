<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Raptor X 30T — Operator Safety Briefing Video</title>

<!-- PWA / mobile install -->
<meta name="theme-color" content="#1a1814" />
<meta name="description" content="Operator safety briefing video for the Raptor X 30-tonne vertical log splitter." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

<!-- iOS home-screen install -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Raptor X 30T" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800;900&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: "Source Sans 3", system-ui, sans-serif;
    /* Stop iOS double-tap zoom + tap delays */
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }
  #root {
    position: fixed;
    inset: 0;
    /* Respect notch / safe areas in standalone mode */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
  }

  /* Force-landscape on mobile when held in portrait. iOS Safari ignores the
     manifest's orientation:landscape so we rotate the content ourselves. */
  @media (orientation: portrait) and (max-width: 900px) {
    #root {
      inset: auto;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      padding: 0;
    }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>

<script type="text/babel">

// Scene timing — each entry is [start, end] seconds.
// Slight overlaps let scenes cross-fade via their built-in entry/exit.
const SCENES = [
  { Cmp: SceneColdOpen,  start: 0.0,  end: 4.2  },
  { Cmp: SceneTitle,     start: 3.8,  end: 9.2  },
  { Cmp: SceneMachine,   start: 9.0,  end: 15.8 },
  { Cmp: ScenePTO,       start: 15.5, end: 22.8 },
  { Cmp: SceneHydraulic, start: 22.5, end: 29.8 },
  { Cmp: ScenePPE,       start: 29.5, end: 38.8 },
  { Cmp: SceneProcedure, start: 38.5, end: 50.8 },
  { Cmp: SceneZones,     start: 50.5, end: 58.4 },
  { Cmp: SceneClose,     start: 58.0, end: 68.0 },
];

const TOTAL = 68.0;

function ProgressTicker() {
  const { time } = useTimeline();
  // Determine active scene label
  const labels = [
    'Cold open', 'Title', 'Machine', '§08 PTO',
    '§09 Hydraulic', '§06 PPE', '§13 Procedure',
    '§10 Zones', 'Close',
  ];
  let activeIdx = 0;
  for (let i = 0; i < SCENES.length; i++) {
    if (time >= SCENES[i].start) activeIdx = i;
  }
  const pct = (time / TOTAL) * 100;

  return (
    <div style={{
      position: 'absolute', left: 40, top: 40, right: 40,
      zIndex: 100, pointerEvents: 'none',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      mixBlendMode: 'difference',
    }}>
      <div style={{
        fontFamily: '"JetBrains Mono", monospace',
        fontSize: 13, color: 'rgba(255,255,255,0.55)',
        letterSpacing: '0.2em', textTransform: 'uppercase',
      }}>
        {String(activeIdx + 1).padStart(2, '0')} · {labels[activeIdx]}
      </div>
      <div style={{
        fontFamily: '"JetBrains Mono", monospace',
        fontSize: 13, color: 'rgba(255,255,255,0.55)',
        letterSpacing: '0.2em', textTransform: 'uppercase',
        fontVariantNumeric: 'tabular-nums',
      }}>
        {time.toFixed(1).padStart(4, '0')} / {TOTAL.toFixed(1)} s
      </div>
    </div>
  );
}

function App() {
  return (
    <Stage
      width={1920}
      height={1080}
      duration={TOTAL}
      background="#1a1814"
      speed={0.7}
      resetOnLoad={true}
      persistKey="raptor-briefing"
    >
      {SCENES.map((s, i) => (
        <Sprite key={i} start={s.start} end={s.end}>
          <s.Cmp />
        </Sprite>
      ))}
      <ProgressTicker />
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>

<!-- Register the service worker for offline + instant-load. Skipped on
     unsupported origins (e.g. file://) so local previews still work. -->
<script>
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('SW registration failed:', err);
      });
    });
  }

  // Try to lock orientation to landscape on supporting browsers (Android Chrome
  // in standalone mode). iOS Safari has no API for this — the CSS rotate fallback
  // above handles iOS portrait. Wrapped in try/catch so silently fails elsewhere.
  function tryLockLandscape() {
    try {
      if (screen.orientation && typeof screen.orientation.lock === 'function') {
        screen.orientation.lock('landscape').catch(() => {});
      }
    } catch (e) { /* not supported — CSS fallback applies */ }
  }
  // Some browsers require a user gesture first; try both eagerly and on first tap.
  tryLockLandscape();
  window.addEventListener('pointerdown', tryLockLandscape, { once: true });
</script>
</body>
</html>
